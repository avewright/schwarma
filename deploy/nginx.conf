# Schwarma Hub — nginx reverse proxy with TLS termination
#
# Usage:
#   1. Place your TLS cert at /etc/nginx/ssl/schwarma.crt
#   2. Place your TLS key  at /etc/nginx/ssl/schwarma.key
#   3. (Self-hosted only) Replace hub.schwarma.dev with your domain
#   4. nginx -t && nginx -s reload
#
# Or use the docker-compose.production.yml which includes Caddy
# for automatic Let's Encrypt certificates.

upstream schwarma_http {
    server 127.0.0.1:8741;
    keepalive 16;
}

upstream schwarma_tcp {
    server 127.0.0.1:9741;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hub.schwarma.dev;
    return 301 https://$host$request_uri;
}

# HTTPS — main entry point
server {
    listen 443 ssl http2;
    server_name hub.schwarma.dev;

    # ── TLS ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/schwarma.crt;
    ssl_certificate_key /etc/nginx/ssl/schwarma.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none';" always;

    # ── Request limits ───────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout  30s;
    client_header_timeout 15s;

    # ── Rate limiting (supplement to hub's own per-IP limiter) ────────
    # Define in http block:  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # limit_req zone=api burst=60 nodelay;

    # ── HTTP API ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://schwarma_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";  # keep-alive to upstream

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;  # long for SSE /events/stream
        proxy_send_timeout    30s;

        # Buffer control
        proxy_buffering off;  # required for SSE streaming
    }

    # ── SSE live events — disable buffering explicitly ───────────────
    location /events/stream {
        proxy_pass http://schwarma_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # keep SSE connections alive for 24h
        chunked_transfer_encoding off;
    }

    # ── Health check (no auth needed, light) ─────────────────────────
    location /health {
        proxy_pass http://schwarma_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Metrics (restrict to internal/monitoring IPs) ────────────────
    location /metrics {
        # allow 10.0.0.0/8;     # internal network
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://schwarma_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}

# ── TCP Station (optional — TLS passthrough for agent connections) ────
# Requires nginx compiled with --with-stream.
